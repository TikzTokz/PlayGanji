services:
  ganji:
    build:
      context: .
      dockerfile: Dockerfile
    image: playganji:latest
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://localhost:3001/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
