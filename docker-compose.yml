services:
  ganji:
    build:
      context: .
      dockerfile: Dockerfile
    image: playganji:latest
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - bun
        - --eval
        - "fetch('http://localhost:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
